<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML + Python + C++ Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            min-height: 60px;
        }
        
        .result-box h3 {
            color: #555;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .result-box .data {
            font-size: 1.2rem;
            color: #333;
            font-weight: 500;
        }
        
        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .tech-item {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .tech-item.html { color: #e34f26; }
        .tech-item.python { color: #3776ab; }
        .tech-item.cpp { color: #00599c; }
        
        .loading {
            display: none;
            text-align: center;
            margin: 10px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Multi-Language Integration</h1>
        
        <div class="tech-stack">
            <span class="tech-item html">HTML/CSS</span>
            <span class="tech-item python">Python</span>
            <span class="tech-item cpp">C++</span>
        </div>
        
        <div class="input-group">
            <label for="operation">🔧 Select Operation</label>
            <select id="operation">
                <option value="fibonacci">Fibonacci Sequence (C++)</option>
                <option value="prime">Prime Check (C++)</option>
                <option value="sort">Sort Array (C++)</option>
                <option value="analyze">Text Analysis (Python)</option>
                <option value="database">Database Query (Python)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="inputData">📝 Input Data</label>
            <input type="text" id="inputData" placeholder="Enter data (e.g., 10, 5 2 8 1 9, Hello World)" value="10">
        </div>
        
        <button onclick="callBackend()">🚀 Execute</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Processing...</p>
        </div>
        
        <div class="result-box">
            <h3>📊 Result</h3>
            <div class="data" id="result">Ready for input</div>
        </div>
        
        <div style="margin-top: 15px; font-size: 0.8rem; color: #999; text-align: center;">
            <span id="executionTime"></span>
        </div>
    </div>
    
    <script>
        async function callBackend() {
            const operation = document.getElementById('operation').value;
            const inputData = document.getElementById('inputData').value;
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '⏳ Processing...';
            document.getElementById('executionTime').textContent = '';
            
            const startTime = performance.now();
            
            try {
                const response = await fetch('http://localhost:5000/api/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        operation: operation,
                        data: inputData
                    })
                });
                
                const result = await response.json();
                
                const endTime = performance.now();
                const timeTaken = ((endTime - startTime) / 1000).toFixed(3);
                
                document.getElementById('result').textContent = result.result;
                document.getElementById('executionTime').textContent = `⏱️ ${timeTaken}s (Backend: ${result.backend_time || 'N/A'})`;
                
            } catch (error) {
                document.getElementById('result').textContent = '❌ Error: ' + error.message;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // Enter key support
        document.getElementById('inputData').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                callBackend();
            }
        });
    </script>
</body>
</html>
